<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Employee Management System</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

	<div class="container mt-5">

		<div class="card shadow">

			<div class="card-header bg-primary text-white text-center">
				<h2>Employee Management System</h2>
			</div>

			<div class="card-body text-center">

				<a href="/add" class="btn btn-success btn-lg m-3">
					Add Employee
				</a>

				<a href="/display" class="btn btn-primary btn-lg m-3">
					Display Employees
				</a>

				<a href="/raise" class="btn btn-warning btn-lg m-3">
					Raise Salary
				</a>

				<a href="/exit" class="btn btn-danger btn-lg m-3"
					onclick="return confirm('Are you sure you want to exit the application?');">
					Exit
				</a>

			</div>

		</div>

	</div>

</body>

</html>
