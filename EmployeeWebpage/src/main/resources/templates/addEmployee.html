<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">
	<title>Add Employee</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

	<div class="container mt-5">

		<div class="card shadow">

			<div class="card-header bg-success text-white">

				<h2>Add Employee</h2>

			</div>

			<div class="card-body">

				<form th:action="@{/save}" th:object="${employee}" method="post">

					<div class="mb-3">

						<label>Name</label>

						<input type="text" class="form-control" th:field="*{name}">

						<div class="text-danger" th:errors="*{name}"></div>

					</div>

					<div class="mb-3">

						<label>Age</label>

						<input type="number" class="form-control" th:field="*{age}">

						<div class="text-danger" th:errors="*{age}"></div>

					</div>

					<div class="mb-3">

						<label>Salary</label>

						<input type="number" class="form-control" th:field="*{salary}">

						<div class="text-danger" th:errors="*{salary}"></div>

					</div>

					<div class="mb-3">

						<label>Designation</label>

						<input type="text" class="form-control" th:field="*{designation}">

						<div class="text-danger" th:errors="*{designation}"></div>

					</div>

					<button class="btn btn-success">
						Save Employee
					</button>

					<a href="/" class="btn btn-secondary">
						Home
					</a>

				</form>

			</div>

		</div>

	</div>

</body>

</html>
